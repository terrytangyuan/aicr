## Flox Environment Manifest -----------------------------------------
##
##   _Everything_ you need to know about the _manifest_ is here:
##
##   https://flox.dev/docs/reference/command-reference/manifest.toml/
##
## -------------------------------------------------------------------
# Flox manifest version managed by Flox CLI
schema-version = "1.11.0"


## Install Packages --------------------------------------------------
##  Tracks tools/setup-tools — dev tools from .settings.yaml (best-effort)
## -------------------------------------------------------------------
[install]
# Language
go.pkg-path = "go_1_26"
go.version = "^1.26"

# Build tools
goreleaser.pkg-path = "goreleaser"
goreleaser.version = "^2"
ko.pkg-path = "ko"
ko.version = "^0.18"
crane.pkg-path = "crane"
crane.version = "^0.21"
crane.outputs = "all"
git-cliff.pkg-path = "git-cliff"
git-cliff.version = "^2"

# Linting
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "^2"
yamllint.pkg-path = "yamllint"
yamllint.version = "^1"
yamllint.outputs = "all"
addlicense.pkg-path = "addlicense"
go-licenses.pkg-path = "go-licenses"

# Security tools
grype.pkg-path = "grype"
# grype 0.107 was never packaged in nixpkgs; 0.108 is latest available
grype.version = "^0.108"
cosign.pkg-path = "cosign"
cosign.version = "^3"
syft.pkg-path = "syft"
syft.version = "^1.42"

# Kubernetes / testing tools
kubectl.pkg-path = "kubectl"
kubectl.version = "^1.35"
kubectl.outputs = "all"
kubernetes-helm.pkg-path = "kubernetes-helm"
# helm 4 not yet in nixpkgs; unpinned to get latest available (v3.x)
kind.pkg-path = "kind"
kind.version = "^0.31"
ctlptl.pkg-path = "ctlptl"
ctlptl.version = "^0.9"
tilt.pkg-path = "tilt"
tilt.version = "^0.37"
tilt.pkg-group = "tilt"
chainsaw.pkg-path = "kyverno-chainsaw"
chainsaw.version = "^0.2"
kwok.pkg-path = "kwok"
kwok.version = "^0.7"
# Note: karpenter is a server-side K8s controller (deployed via Helm into
# clusters), not a local CLI tool. It is intentionally excluded.

# Documentation tools
hugo.pkg-path = "hugo"
hugo.version = "~0.155"
nodejs.pkg-path = "nodejs_22"

# Utilities
yq.pkg-path = "yq-go"
yq.version = "^4"


## Environment Variables ---------------------------------------------
##  GOPATH/GOBIN keep Go tool installs inside the flox environment cache
##  Note: GOFLAGS="-mod=vendor" is intentionally NOT set here — it breaks
##  `go install` and `go get`. The Makefile sets it per-command where needed.
## -------------------------------------------------------------------
[vars]


## Activation Hook ---------------------------------------------------
##  Runs once in bash on `flox activate`. Exported variables are inherited
##  by [profile] scripts and the user's shell, so there is no need to
##  duplicate them in [profile].
##  https://flox.dev/docs/tutorials/customizing-environments/
## -------------------------------------------------------------------
[hook]
on-activate = '''
  export GOPATH="$FLOX_ENV_CACHE/go"
  export GOBIN="$GOPATH/bin"
  export PATH="$GOBIN:$PATH"
  mkdir -p "$GOBIN"

  # Helm v3 notice — nixpkgs does not yet package Helm 4.
  # Once available, pin kubernetes-helm.version = "^4" and remove this note.
  helm_ver="$(helm version --short 2>/dev/null || true)"
  if [ -n "$helm_ver" ]; then
    case "$helm_ver" in
      v3.*) echo "⚠ Flox provides Helm ${helm_ver} (v3). Helm 4 is not yet available in nixpkgs." ;;
    esac
  fi
'''


## Profile script ----------------------------------------------------
[profile]


## Services ---------------------------------------------------------
[services]


## Include ----------------------------------------------------------
[include]


## Build and publish your own packages ------------------------------
[build]


## Other Environment Options -----------------------------------------
[options]
