# nvml-mock DaemonSet - Fallback manifest for GPU simulation
#
# This manifest is used when the nvml-mock Helm chart from
# NVIDIA/k8s-test-infra is not available via OCI registry.
#
# Placeholder values (NVML_MOCK_IMAGE_PLACEHOLDER, NVML_MOCK_VERSION_PLACEHOLDER,
# GPU_COUNT_PLACEHOLDER, GPU_PROFILE_PLACEHOLDER) are substituted by
# setup-gpu-mock.sh at deploy time.
---
apiVersion: v1
kind: Namespace
metadata:
  name: nvml-mock
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvml-mock
  namespace: nvml-mock
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nvml-mock
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nvml-mock
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nvml-mock
subjects:
  - kind: ServiceAccount
    name: nvml-mock
    namespace: nvml-mock
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvml-mock-config
  namespace: nvml-mock
data:
  config.yaml: |
    profile: GPU_PROFILE_PLACEHOLDER
    gpuCount: GPU_COUNT_PLACEHOLDER
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvml-mock
  namespace: nvml-mock
  labels:
    app: nvml-mock
spec:
  selector:
    matchLabels:
      app: nvml-mock
  template:
    metadata:
      labels:
        app: nvml-mock
    spec:
      serviceAccountName: nvml-mock
      containers:
        - name: nvml-mock
          image: NVML_MOCK_IMAGE_PLACEHOLDER:NVML_MOCK_VERSION_PLACEHOLDER
          command: ["/scripts/entrypoint.sh"]
          env:
            - name: GPU_COUNT
              value: "GPU_COUNT_PLACEHOLDER"
            - name: DRIVER_VERSION
              value: "DRIVER_VERSION_PLACEHOLDER"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-nvml-mock
              mountPath: /host/var/lib/nvml-mock
            - name: gpu-config
              mountPath: /config
              readOnly: true
            - name: host-cdi
              mountPath: /host/var/run/cdi
            - name: host-run-nvidia
              mountPath: /host/run/nvidia
          securityContext:
            privileged: true
          lifecycle:
            preStop:
              exec:
                command: ["/scripts/cleanup.sh"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: host-nvml-mock
          hostPath:
            path: /var/lib/nvml-mock
            type: DirectoryOrCreate
        - name: gpu-config
          configMap:
            name: nvml-mock-config
        - name: host-cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
        - name: host-run-nvidia
          hostPath:
            path: /run/nvidia
            type: DirectoryOrCreate
      tolerations:
        - operator: Exists
