# Assert monitoring stack components are healthy.
# Covers kube-prometheus-stack, k8s-ephemeral-storage-metrics, and prometheus-adapter.
#
# Resource naming from fullnameOverride values:
#   kube-prometheus-stack: fullnameOverride=kube-prometheus
#   grafana: fullnameOverride=grafana
#   kube-state-metrics: fullnameOverride=kube-state-metrics
#   prometheus-node-exporter: fullnameOverride=prometheus-node-exporter

# Prometheus Operator — manages Prometheus, Alertmanager, and ServiceMonitor CRs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-prometheus-operator
  namespace: monitoring
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# Grafana — dashboards and visualization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# kube-state-metrics — Kubernetes object state metrics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: monitoring
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# Prometheus StatefulSet — time series database
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus-kube-prometheus-prometheus
  namespace: monitoring
status:
  (readyReplicas > `0`): true
---
# Alertmanager StatefulSet — alert routing and silencing
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager-kube-prometheus-alertmanager
  namespace: monitoring
status:
  (readyReplicas > `0`): true
---
# Prometheus Node Exporter DaemonSet — node-level hardware/OS metrics
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prometheus-node-exporter
  namespace: monitoring
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# k8s-ephemeral-storage-metrics — ephemeral storage usage metrics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ephemeral-storage-metrics
  namespace: monitoring
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# Prometheus Adapter — custom metrics API for HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-adapter
  namespace: monitoring
status:
  (conditions[?type == 'Available']):
    - status: "True"
