# Assert cert-manager deployments are available.
# fullnameOverride: cert-manager (from values.yaml)
# Chart: jetstack/cert-manager v1.17.2

# Main controller — issues and renews certificates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-manager
  namespace: cert-manager
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# Webhook — validates and mutates cert-manager resources
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-manager-webhook
  namespace: cert-manager
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# CA Injector — injects CA bundles into webhook configurations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-manager-cainjector
  namespace: cert-manager
status:
  (conditions[?type == 'Available']):
    - status: "True"
