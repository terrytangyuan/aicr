# Assert GPU operator and all managed components are healthy.
# fullnameOverride: gpu-operator (from values.yaml)
# Chart: nvidia/gpu-operator v25.10.1
#
# The GPU operator controller creates a ClusterPolicy CR, which in turn
# creates DaemonSets for the driver, device-plugin, toolkit, DCGM, GFD,
# and validator. The ClusterPolicy status.state=ready check is the primary
# health signal — if it is ready, all sub-components are functional.

# GPU Operator controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-operator
  namespace: gpu-operator
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# ClusterPolicy — umbrella health check for all GPU operator sub-components.
# When status.state is "ready", the driver, device-plugin, toolkit, DCGM
# exporter, GFD, MIG manager, and validator are all functional.
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: cluster-policy
status:
  state: ready
---
# NVIDIA operator validator DaemonSet — runs on every GPU node and confirms
# that driver, toolkit, device-plugin, and DCGM are all working.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-operator-validator
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# NVIDIA driver DaemonSet — compiles and loads the GPU driver on each node.
# This is the slowest component (driver compilation can take several minutes).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-driver-daemonset
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# NVIDIA device plugin DaemonSet — exposes GPUs as allocatable resources
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# DCGM Exporter DaemonSet — GPU metrics for Prometheus
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-dcgm-exporter
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# NVIDIA Container Toolkit DaemonSet — configures container runtimes for GPU access
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-container-toolkit-daemonset
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# GPU Feature Discovery DaemonSet — labels nodes with GPU properties
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-feature-discovery
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# NVIDIA DCGM DaemonSet — Data Center GPU Manager for health and diagnostics
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-dcgm
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# NVIDIA MIG Manager DaemonSet — manages Multi-Instance GPU partitioning
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-mig-manager
  namespace: gpu-operator
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
---
# NVIDIA Device Plugin MPS Control Daemon — Multi-Process Service for GPU sharing
# desiredNumberScheduled may be 0 when MPS is not enabled
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-mps-control-daemon
  namespace: gpu-operator
