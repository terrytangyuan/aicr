# Assert Dynamo platform components are healthy.
# Chart: dynamo-platform 0.9.0
# Provides NVIDIA Dynamo inference serving: OpenAI-compatible endpoints,
# KV-cache-aware routing, disaggregated prefill/decode, SLA-driven autoscaling.
#
# v0.9.0: etcd and NATS are disabled — Kubernetes-native discovery replaces
# etcd, ZMQ event plane replaces NATS. Only operator and grove are deployed.

# Dynamo Operator — manages DynamoComponent and DynamoGraphDeployment CRs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamo-platform-dynamo-operator-controller-manager
  namespace: dynamo-system
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# Grove Operator — pod lifecycle management for DynamoGraphDeployments
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grove-operator
  namespace: dynamo-system
status:
  (conditions[?type == 'Available']):
    - status: "True"
