# Assert KAI scheduler is available.
# Chart: kai-scheduler v0.12.10 (oci://ghcr.io/nvidia/kai-scheduler)
# GPU-aware Kubernetes scheduler with gang scheduling, hierarchical queuing,
# bin-packing, and topology-aware placement.
# Satisfies CNCF AI Conformance gang scheduling requirement.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kai-scheduler-default
  namespace: kai-scheduler
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# KAI admission webhook — validates and mutates scheduling requests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admission
  namespace: kai-scheduler
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# KAI binder — binds pods to nodes after scheduling decisions
apiVersion: apps/v1
kind: Deployment
metadata:
  name: binder
  namespace: kai-scheduler
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# KAI operator — manages KAI scheduler lifecycle
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kai-operator
  namespace: kai-scheduler
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# KAI pod grouper — groups related pods for gang scheduling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-grouper
  namespace: kai-scheduler
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# KAI podgroup controller — manages PodGroup lifecycle
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podgroup-controller
  namespace: kai-scheduler
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# KAI queue controller — manages hierarchical scheduling queues
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-controller
  namespace: kai-scheduler
status:
  (conditions[?type == 'Available']):
    - status: "True"
