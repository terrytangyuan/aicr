# Assert NVSentinel controller and platform connector are healthy on kind.
# Kind profile — reduced DaemonSet expectations compared to EKS.
# Compared to the EKS cluster test:
#   Removed: gpu-health-monitor-dcgm-4.x (may not schedule in kind)
#   Removed: gpu-health-monitor-dcgm-3.x (may not schedule in kind)
#   Removed: metadata-collector (may not schedule in kind)
#   Removed: syslog-health-monitor-regular (may not schedule in kind)
#   Removed: syslog-health-monitor-kata (may not schedule in kind)

# NVSentinel controller — manages network policies and platform configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: labeler
  namespace: nvsentinel
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# NVSentinel platform connector — DaemonSet on all nodes for platform telemetry
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: platform-connectors
  namespace: nvsentinel
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
