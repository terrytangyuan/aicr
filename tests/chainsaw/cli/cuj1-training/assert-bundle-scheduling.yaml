# Assert gpu-operator values.yaml for CUJ1 training workload.
#
# Validates scheduling injection AND key training-specific settings.
#
# NOTE: chainsaw assert --resource requires apiVersion/kind to parse the YAML.
# Helm values files don't have these natively, so we prepend them in the test
# script before asserting. These two lines are not part of the actual values.
apiVersion: helm/v1
kind: Values

# ── Scheduling: system components ────────────────────────────────────
operator:
  nodeSelector:
    nodeGroup: system-pool
  upgradeCRD: true

# ── Scheduling: GPU daemonsets ───────────────────────────────────────
daemonsets:
  nodeSelector:
    nodeGroup: gpu-worker
  tolerations:
    - key: nvidia.com/gpu
      value: present
      effect: NoSchedule

# ── Driver: RDMA required for multi-node training ────────────────────
driver:
  enabled: true
  rdma:
    enabled: true
  useOpenKernelModules: true

# ── GDRCopy: GPU-direct memory for high-performance training ─────────
gdrcopy:
  enabled: true

# ── CDI: Container Device Interface for GPU access ───────────────────
cdi:
  enabled: true

# ── GPU monitoring and feature discovery ─────────────────────────────
dcgm:
  enabled: true
gfd:
  enabled: true
migManager:
  enabled: true
toolkit:
  enabled: true

# ── Node Feature Discovery ──────────────────────────────────────────
# NFD deployed as standalone shared component — sub-chart disabled
nfd:
  enabled: false
