# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-snapshot-template
spec:
  description: |
    Validates the snapshot --template and --format flags.
    Tests flag existence, format validation, invalid paths, example
    template existence, and standard formats.
    Replaces test_snapshot_template_flags() in tools/e2e.
    No cluster needed.
  timeouts:
    exec: 180s
  steps:
    - name: setup
      description: Create a test template file.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-snapshot-template"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              cat > "${WORK}/test.tmpl" << 'EOF'
              kind: {{ .Kind }}
              apiVersion: {{ .APIVersion }}
              EOF

    - name: template-flag-exists
      description: Verify snapshot --help mentions template flag.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              ${AICR_BIN} snapshot --help 2>&1
            check:
              (contains($stdout, 'template')): true

    - name: json-format-rejected-with-template
      description: JSON format with --template must be rejected (templates require YAML).
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-snapshot-template"
              ${AICR_BIN} snapshot --template "${WORK}/test.tmpl" --format json 2>&1 || true
            check:
              (contains($stderr, 'YAML format') || contains($stderr, 'requires YAML') || contains($stdout, 'YAML format') || contains($stdout, 'requires YAML')): true

    - name: nonexistent-template
      description: Non-existent template path must produce an error.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              ${AICR_BIN} snapshot --template "/non/existent.tmpl" 2>&1 || true
            check:
              (contains($stderr, 'not found') || contains($stderr, 'no such file') || contains($stderr, 'does not exist') || contains($stdout, 'not found') || contains($stdout, 'no such file') || contains($stdout, 'does not exist')): true

    - name: directory-as-template
      description: Directory path as --template must produce an error.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-snapshot-template"
              ${AICR_BIN} snapshot --template "${WORK}" 2>&1 || true
            check:
              (contains($stderr, 'directory') || contains($stderr, 'not a file') || contains($stdout, 'directory') || contains($stdout, 'not a file')): true

    - name: example-template-exists
      description: Verify the example snapshot template file exists in the repo.
      try:
        - script:
            content: |
              REPO_ROOT="${REPO_ROOT:-$(git rev-parse --show-toplevel)}"
              test -f "${REPO_ROOT}/examples/templates/snapshot-template.md.tmpl"
            check:
              ($error == null): true

    - name: standard-formats
      description: Standard YAML and JSON formats without --template are accepted (validated via help output, no cluster needed).
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              # Verify --format flag is documented in help (accepts yaml/json)
              help_output=$(${AICR_BIN} snapshot --help 2>&1)
              echo "$help_output" | grep -q "format" || { echo "--format flag not found in help" >&2; exit 1; }
              # Verify invalid format is rejected quickly (no cluster needed)
              output=$(${AICR_BIN} snapshot --format "invalid_fmt" 2>&1) || true
              if echo "$output" | grep -qi "invalid\|unknown\|unsupported"; then
                echo "Invalid format correctly rejected"
              else
                echo "Expected invalid format to be rejected" >&2
                exit 1
              fi
            check:
              ($error == null): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-snapshot-template
