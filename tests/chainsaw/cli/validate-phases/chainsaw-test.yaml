# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-validate-phases
spec:
  description: |
    Validates the multi-phase validation CLI (--phase flag).
    Tests individual phases, --phase all, invalid phase, and multiple --phase flags.
    No cluster needed. Output is CTRF JSON.
  timeouts:
    exec: 30s
  steps:
    - name: setup
      description: Generate recipe and mock snapshot for validation tests.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-validate-phases"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe --service eks --accelerator h100 --intent training \
                -o "${WORK}/recipe.yaml"
              cat > "${WORK}/snapshot.yaml" << 'SNAP'
              measurements:
                - type: K8s
                  subtypes:
                    - name: server
                      data:
                        version: v1.33.0
                - type: OS
                  subtypes:
                    - name: release
                      data:
                        ID: ubuntu
                        VERSION_ID: "24.04"
              SNAP

    - name: individual-phases
      description: Verify each individual phase produces output mentioning the phase name.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-validate-phases"
              for phase in deployment performance conformance; do
                output=$(${AICR_BIN} validate -r "${WORK}/recipe.yaml" \
                  -s "${WORK}/snapshot.yaml" --phase "$phase" --no-cluster 2>&1) || true
                if ! echo "$output" | grep -qi "$phase"; then
                  echo "Phase '$phase' not found in output" >&2
                  exit 1
                fi
              done
            check:
              ($error == null): true

    - name: phase-all
      description: Verify --phase all produces deployment, performance, and conformance phases.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-validate-phases"
              output=$(${AICR_BIN} validate -r "${WORK}/recipe.yaml" \
                -s "${WORK}/snapshot.yaml" --phase all --no-cluster \
                -o "${WORK}/all-phases.json" 2>&1) || true
              count=0
              echo "$output" | grep -q "deployment" && count=$((count+1))
              echo "$output" | grep -q "performance" && count=$((count+1))
              echo "$output" | grep -q "conformance" && count=$((count+1))
              if [ "$count" -lt 3 ]; then
                echo "Expected 3 phases, found $count" >&2
                exit 1
              fi
            check:
              ($error == null): true

    - name: result-structure
      description: Verify --phase all output file is a valid CTRF report.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-validate-phases"
              # CTRF report should have reportFormat field (JSON output)
              grep -q '"reportFormat"' "${WORK}/all-phases.json"
            check:
              ($error == null): true

    - name: invalid-phase
      description: Verify invalid phase name produces an error.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-validate-phases"
              ${AICR_BIN} validate -r "${WORK}/recipe.yaml" \
                -s "${WORK}/snapshot.yaml" --phase invalid-phase --no-cluster 2>&1 || true
            check:
              (contains($stderr, 'invalid phase') || contains($stdout, 'invalid phase')): true

    - name: multiple-phase-flags
      description: Verify multiple --phase flags produce all requested phases.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-validate-phases"
              output=$(${AICR_BIN} validate -r "${WORK}/recipe.yaml" \
                -s "${WORK}/snapshot.yaml" --no-cluster \
                --phase deployment --phase conformance 2>&1) || true
              echo "$output" | grep -q "deployment" || { echo "deployment missing" >&2; exit 1; }
              echo "$output" | grep -q "conformance" || { echo "conformance missing" >&2; exit 1; }
            check:
              ($error == null): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-validate-phases
