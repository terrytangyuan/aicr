apiVersion: v1
kind: Pod
metadata:
  name: nvidia-smi-verify-${POD_SUFFIX}
  namespace: ${NAMESPACE}
  labels:
    source: e2e-tests
spec:
  restartPolicy: Never
  nodeName: ${NODE_NAME}
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: nvidia-smi-verify-container
    image: ${IMAGE}
    command: ["/bin/sh", "-c"]
    args: ["nvidia-smi && echo GPU_CHECK_SUCCESS"]
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
  # Tolerate all taints — the pod is pinned to a specific GPU node via nodeName,
  # so scheduling is not affected. Tolerations prevent taint-based eviction.
  tolerations:
  - operator: Exists
