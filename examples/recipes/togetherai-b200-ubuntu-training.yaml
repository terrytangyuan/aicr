kind: RecipeResult
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  version: dev
  appliedOverlays:
    - base
    - monitoring-hpa
    - togetherai
    - togetherai-training
    - b200-togetherai-training
    - b200-togetherai-ubuntu-training
criteria:
  service: togetherai
  accelerator: b200
  intent: training
  os: ubuntu
  platform: any
constraints:
  - name: K8s.server.version
    value: '>= 1.34'
  - name: OS.release.ID
    value: ubuntu
componentRefs:
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager
    type: Helm
    source: https://charts.jetstack.io
    version: v1.17.2
    valuesFile: components/cert-manager/values.yaml
  - name: gpu-operator
    namespace: gpu-operator
    chart: gpu-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: v25.10.1
    valuesFile: components/gpu-operator/values-togetherai.yaml
    overrides:
      cdi:
        enabled: true
      gdrcopy:
        enabled: true
      validator:
        plugin:
          env:
            - name: WITH_WORKLOAD
              value: "false"
    dependencyRefs:
      - cert-manager
      - kube-prometheus-stack
      - skyhook-customizations
    manifestFiles:
      - components/gpu-operator/manifests/dcgm-exporter.yaml
  - name: k8s-ephemeral-storage-metrics
    namespace: monitoring
    chart: k8s-ephemeral-storage-metrics
    type: Helm
    source: https://jmcgrath207.github.io/k8s-ephemeral-storage-metrics/chart
    version: 1.19.2
    valuesFile: components/k8s-ephemeral-storage-metrics/values.yaml
    dependencyRefs:
      - kube-prometheus-stack
  - name: kai-scheduler
    namespace: kai-scheduler
    chart: kai-scheduler
    type: Helm
    source: oci://ghcr.io/nvidia/kai-scheduler
    version: v0.12.17
    valuesFile: components/kai-scheduler/values.yaml
    dependencyRefs:
      - gpu-operator
    manifestFiles:
      - components/kai-scheduler/manifests/disable-runtime-class-injection.yaml
  - name: kube-prometheus-stack
    namespace: monitoring
    chart: kube-prometheus-stack
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 82.8.0
    valuesFile: components/kube-prometheus-stack/values.yaml
  - name: network-operator
    namespace: nvidia-network-operator
    chart: network-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: 25.10.0
    valuesFile: components/network-operator/values-togetherai.yaml
    dependencyRefs:
      - cert-manager
  - name: nvidia-dra-driver-gpu
    namespace: nvidia-dra-driver
    chart: nvidia-dra-driver-gpu
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: 25.12.0
    valuesFile: components/nvidia-dra-driver-gpu/values.yaml
    dependencyRefs:
      - gpu-operator
  - name: nvsentinel
    namespace: nvsentinel
    chart: nvsentinel
    type: Helm
    source: oci://ghcr.io/nvidia
    version: v1.1.0
    valuesFile: components/nvsentinel/values.yaml
    dependencyRefs:
      - cert-manager
      - gpu-operator
  - name: prometheus-adapter
    namespace: monitoring
    chart: prometheus-adapter
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 5.3.0
    valuesFile: components/prometheus-adapter/values.yaml
    dependencyRefs:
      - kube-prometheus-stack
  - name: skyhook-customizations
    namespace: skyhook
    type: Helm
    source: ""
    overrides:
      accelerator: b200
      intent: multiNodeTraining
      service: togetherai
    dependencyRefs:
      - skyhook-operator
    manifestFiles:
      - components/skyhook-customizations/manifests/tuning.yaml
  - name: skyhook-operator
    namespace: skyhook
    chart: skyhook-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia/skyhook
    version: v0.14.0
    valuesFile: components/skyhook-operator/values.yaml
deploymentOrder:
  - cert-manager
  - kube-prometheus-stack
  - k8s-ephemeral-storage-metrics
  - network-operator
  - prometheus-adapter
  - skyhook-operator
  - skyhook-customizations
  - gpu-operator
  - kai-scheduler
  - nvidia-dra-driver-gpu
  - nvsentinel
validation:
  deployment:
    constraints:
      - name: Deployment.gpu-operator.version
        value: '>= v24.6.0'
    checks:
      - operator-health
      - expected-resources
      - gpu-operator-version
      - check-nvidia-smi
  performance:
    constraints:
      - name: nccl-all-reduce-bw
        value: '>= 300'
    checks:
      - nccl-all-reduce-bw
  conformance:
    checks:
      - platform-health
      - gpu-operator-health
      - dra-support
      - accelerator-metrics
      - ai-service-metrics
      - gang-scheduling
      - pod-autoscaling
      - cluster-autoscaling
      - robust-controller
      - secure-accelerator-access
