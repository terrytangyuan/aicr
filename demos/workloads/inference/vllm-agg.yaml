# Prerequisites:
#   - KAI Scheduler installed (provides default-parent-queue)
#   - Dynamo platform deployed (dynamo-crds + dynamo-platform)

---
# KAI Scheduler queue for Dynamo workloads
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: dynamo
spec:
  parentQueue: default-parent-queue
  resources:
    gpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    cpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    memory:
      limit: -1
      overQuotaWeight: 1
      quota: 0

---
apiVersion: v1
kind: Namespace
metadata:
  name: dynamo-workload

---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-agg
  namespace: dynamo-workload
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envs:
        - name: SERVED_MODEL_NAME
          value: Qwen/Qwen3-0.6B
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      extraPodSpec:
        nodeSelector:
          nodeGroup: cpu-worker
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:0.9.0
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envs:
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      resources:
        limits:
          gpu: "1"
      extraPodSpec:
        nodeSelector:
          nodeGroup: gpu-worker
        tolerations:
          - key: dedicated
            operator: Equal
            value: worker-workload
            effect: NoSchedule
          - key: dedicated
            operator: Equal
            value: worker-workload
            effect: NoExecute
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:0.9.0
          workingDir: /workspace/examples/backends/vllm
          command: ["python3", "-m", "dynamo.vllm"]
          args: ["--model", "Qwen/Qwen3-0.6B"]
