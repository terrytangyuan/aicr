name: Issue Triage

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:

  triage:
    name: Auto-Triage Issues
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 5
    steps:
      - name: Add needs-triage on new issue
        if: github.event.action == 'opened'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            });

      - name: Remove needs-triage when triaged
        if: >-
          github.event.action == 'labeled' &&
          github.event.label.name != 'needs-triage'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            if (labels.some(l => l.name === 'needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'needs-triage',
              });
            }

      - name: Assign by area label
        if: >-
          github.event.action == 'labeled' &&
          startsWith(github.event.label.name, 'area/')
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.settings.yaml',
            });
            const content = Buffer.from(file.content, 'base64').toString('utf8');

            // Parse area_assignees from .settings.yaml
            const assignees = {};
            let inBlock = false;
            for (const line of content.split('\n')) {
              if (line.startsWith('area_assignees:')) {
                inBlock = true;
                continue;
              }
              if (inBlock) {
                const m = line.match(/^\s+(area\/\S+):\s*(\S+)/);
                if (m) {
                  assignees[m[1]] = m[2];
                } else if (/^\S/.test(line)) {
                  break;
                }
              }
            }

            const label = context.payload.label.name;
            const user = assignees[label];
            if (!user) {
              core.info(`No assignee configured for ${label}`);
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [user],
            });
