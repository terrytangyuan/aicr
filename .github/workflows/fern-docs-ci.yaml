# Validates Fern docs configuration on pull requests that touch docs or fern/.

name: Fern Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'fern/**'
      - '.github/workflows/fern-docs-ci.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fern-check:
    name: Fern Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r .version fern/fern.config.json)

      - name: Fern check
        run: fern check

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --offline --no-progress 'docs/**/*.md'
          fail: true
