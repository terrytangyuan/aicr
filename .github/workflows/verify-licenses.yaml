name: Verify Licenses

on:
  push:
    branches:
      - main
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'vendor/'
      - '.github/workflows/verify-licenses.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'vendor/'
      - '.github/workflows/verify-licenses.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-licenses:
    name: Verify CNCF-Approved Licenses
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: true
          cache-dependency-path: |
            go.sum
            vendor/modules.txt

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@${{ steps.versions.outputs.go_licenses }}

      - name: Report licenses
        env:
          GOFLAGS: -mod=vendor
        run: |
          echo "=== Dependency Licenses ==="
          go-licenses report ./... 2>/dev/null | sort -t',' -k3 | column -t -s','
          echo ""
          echo "=== License Summary ==="
          go-licenses report ./... 2>/dev/null | cut -d',' -f3 | sort | uniq -c | sort -rn

      - name: Check licenses
        env:
          GOFLAGS: -mod=vendor
        run: |
          # Allowed licenses (all CNCF-approved)
          go-licenses check ./... \
            --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT
