name: Verify Licenses

on:
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-licenses:
    name: Verify CNCF-Approved Licenses
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Report licenses
        run: |
          echo "=== Dependency Licenses ==="
          go-licenses report ./... 2>/dev/null | sort -t',' -k3 | column -t -s','
          echo ""
          echo "=== License Summary ==="
          go-licenses report ./... 2>/dev/null | cut -d',' -f3 | sort | uniq -c | sort -rn

      - name: Check licenses
        run: |
          # Allowed licenses (all CNCF-approved)
          go-licenses check ./... \
            --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT
