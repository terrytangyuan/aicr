name: UAT - AWS

on:
  workflow_dispatch: {}  # allow manual runs for testing
  schedule:
    - cron: '0 4 * * *' # daily at midnight PST, runs on default branch only

permissions:
  contents: read
  actions: read
  id-token: write
  packages: write

jobs:
  uat-aws:
    if: github.repository == 'nvidia/aicr'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AWS_ACCOUNT_ID: "615299774277"
      AWS_REGION: "us-east-1"
      GITHUB_ACTIONS_ROLE_NAME: "github-actions-role-aicr"
      DEPLOYMENT_ID: "aicr-uat-${{ github.run_id }}"
      CLUSTER_CONFIG: tests/uat/aws/config.yaml
      EKS_IMAGE: "ghcr.io/mchmarny/cluster/eks@sha256:c631e2bebf605690c6cfbb072cb2116023fd0f6b43c2c4c6ead0416ee586635d"
      VALIDATOR_IMAGE_PREFIX: "ghcr.io/nvidia/aicr-validators"
      VALIDATOR_TAG: "uat-${{ github.run_id }}"

      # Debug
      SKIP_DELETE: "false"  # skip cluster deletion

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Versions
      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      # Build from source
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: '${{ steps.versions.outputs.go }}'
          cache: true
          cache-dependency-path: |
            go.sum
            vendor/modules.txt

      - name: Build aicr binary
        env:
          GOFLAGS: -mod=vendor
        run: |
          go build -o ./aicr ./cmd/aicr
          ./aicr --version

      - name: Authenticate to GHCR
        uses: ./.github/actions/ghcr-login

      - name: Build and push validator images
        run: |
          for phase in deployment performance conformance; do
            IMAGE="${VALIDATOR_IMAGE_PREFIX}/${phase}:${VALIDATOR_TAG}"
            docker build -f "validators/${phase}/Dockerfile" \
              -t "${IMAGE}" .
            docker push "${IMAGE}"
          done

      # Auth
      - name: Configure AWS credentials
        id: auth
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        with:
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.GITHUB_ACTIONS_ROLE_NAME }}"
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-UAT-AICR

      # Capacity check (reads desired count and reservation ID from cluster config)
      - name: Check EC2 capacity reservation
        id: capacity
        run: |
          set -euo pipefail
          GPU_WORKER='.compute.nodeGroups.workers[] | select(.name == "gpu-worker")'
          DESIRED=$(yq eval "${GPU_WORKER} | .capacity.desired" "$CLUSTER_CONFIG")
          RESERVATION=$(yq eval "${GPU_WORKER} | .capacity.reservation.target" "$CLUSTER_CONFIG")
          echo "Reservation: ${RESERVATION}, desired: ${DESIRED}"

          AVAILABLE=$(aws ec2 describe-capacity-reservations \
            --capacity-reservation-ids "${RESERVATION}" \
            --query 'CapacityReservations[0].AvailableInstanceCount' \
            --output text)
          echo "available=${AVAILABLE}" >> "$GITHUB_OUTPUT"
          echo "Available instances in reservation ${RESERVATION}: ${AVAILABLE}"
          if [[ "${AVAILABLE}" -lt "${DESIRED}" ]]; then
            echo "::error::Insufficient capacity: need ${DESIRED} instances, only ${AVAILABLE} available in reservation ${RESERVATION}"
            exit 1
          fi

      # Deps
      - name: Install tools
        id: deps
        uses: ./.github/actions/setup-build-tools
        with:
          install_kubectl: 'true'
          kubectl_version: '${{ steps.versions.outputs.kubectl }}'
          install_yq: 'true'
          yq_version: '${{ steps.versions.outputs.yq }}'
          install_chainsaw: 'true'
          chainsaw_version: '${{ steps.versions.outputs.chainsaw }}'

      # Config
      - name: Update Config
        id: config
        run: |
          set -euox pipefail
          yq -i '.deployment.id = strenv(DEPLOYMENT_ID)' "$CLUSTER_CONFIG"
          yq -i '.cluster.name = strenv(DEPLOYMENT_ID)' "$CLUSTER_CONFIG"
          cat "$CLUSTER_CONFIG"

      # Bringup
      - name: Bringup Infra
        id: infra
        run: |
          set -euox pipefail
          docker run \
            -e CONFIG_CONTENT="$(base64 < $CLUSTER_CONFIG)" \
            -e AUTO_APPROVE=true \
            -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            -e AWS_SESSION_TOKEN="$AWS_SESSION_TOKEN" \
            ${{ env.EKS_IMAGE }} apply

      # Connect
      - name: Connect to Cluster
        id: client
        if: steps.infra.outcome == 'success'
        shell: bash
        run: |
          set -euox pipefail
          echo "Updating kubeconfig..."
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.DEPLOYMENT_ID }}
          echo "Verifying cluster connection..."
          kubectl get nodes

      # Test (capped to guarantee teardown headroom within the 90m job timeout)
      - name: Run UAT Tests
        id: tests
        if: steps.client.outcome == 'success'
        timeout-minutes: 30
        shell: bash
        env:
          AICR_BIN: ${{ github.workspace }}/aicr
          AICR_IMAGE: "${{ env.VALIDATOR_IMAGE }}:${{ env.VALIDATOR_TAG }}"
          AICR_VALIDATOR_IMAGE: "${{ env.VALIDATOR_IMAGE }}:${{ env.VALIDATOR_TAG }}"
        run: |
          set -euxo pipefail
          chainsaw test \
            --config tests/uat/chainsaw-config.yaml \
            --test-dir tests/uat/aws/tests/

      # Teardown (retry up to 3 times)
      - name: Destroy Cluster
        if: always() && steps.infra.outcome != 'skipped' && env.SKIP_DELETE != 'true'
        shell: bash
        run: |
          set -euxo pipefail
          for attempt in 1 2 3; do
            echo "Destroy attempt ${attempt}..."
            if docker run \
              -e CONFIG_CONTENT="$(base64 < $CLUSTER_CONFIG)" \
              -e AUTO_APPROVE=true \
              -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              -e AWS_SESSION_TOKEN="$AWS_SESSION_TOKEN" \
              ${{ env.EKS_IMAGE }} destroy; then
              echo "Cluster destroyed successfully"
              break
            fi
            echo "Destroy attempt ${attempt} failed, retrying..."
            sleep 30
          done

      # Cleanup
      - name: Cleanup validator image
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete UAT-tagged validator images to avoid GHCR clutter
          for phase in deployment performance conformance; do
            VERSION_ID=$(gh api \
              "repos/${{ github.repository }}/packages/container/aicr-validators%2F${phase}/versions" \
              --jq ".[] | select(.metadata.container.tags[] == \"${VALIDATOR_TAG}\") | .id" 2>/dev/null) || true
            if [[ -n "${VERSION_ID}" ]]; then
              gh api --method DELETE \
                "repos/${{ github.repository }}/packages/container/aicr-validators%2F${phase}/versions/${VERSION_ID}" || true
            fi
          done

      # Artifacts
      - name: Upload Test Artifacts
        if: always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: uat-aws-results
          path: |
            tests/uat/aws/tests/**/chainsaw-report*.xml
          retention-days: 30

      # Summary
      - name: Test Summary
        if: always()
        run: |
          echo "## UAT Results (AWS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** \`${{ github.sha }}\` (branch: \`${{ github.ref_name }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Capacity | ${{ steps.capacity.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ steps.deps.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config | ${{ steps.config.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ steps.infra.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Connection | ${{ steps.client.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
