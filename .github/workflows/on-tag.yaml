name: On Tag Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Only build tags with semantic versioning format

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VALIDATOR_IMAGE: ghcr.io/nvidia/eidos-validator

jobs:

  # =============================================================================
  # Test Jobs (reusable workflow — same suite as on-push.yaml)
  # =============================================================================

  tests:
    uses: ./.github/workflows/qualification.yaml
    permissions:
      actions: read
      contents: read

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Security Scan
        uses: ./.github/actions/security-scan
        with:
          severity: 'MEDIUM'
          category: 'trivy-fs'

  # =============================================================================
  # Build Job: GoReleaser (binaries, ko images, draft GitHub release)
  # =============================================================================

  build:
    name: Build and Release (Draft)
    runs-on: ubuntu-latest
    needs: [tests, security-scan]
    timeout-minutes: 30
    outputs:
      release_outcome: ${{ steps.release.outputs.release_outcome }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: true

      - name: Build and Release
        id: release
        uses: ./.github/actions/go-build-release
        with:
          ko_version: ${{ steps.versions.outputs.ko }}

  # =============================================================================
  # Docker Jobs: Native per-arch validator builds (parallel with GoReleaser)
  # =============================================================================

  docker-validator:
    name: Docker Validator (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [tests, security-scan]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: Dockerfile.validator
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.VALIDATOR_IMAGE }}:${{ github.ref_name }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=eidos-validator
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # =============================================================================
  # Docker Manifest: Combine per-arch images into multi-arch manifests
  # =============================================================================

  docker-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker-validator]
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Create multi-arch manifest
        uses: ./.github/actions/docker-manifest
        with:
          image: ${{ env.VALIDATOR_IMAGE }}
          tag: ${{ github.ref_name }}

  # =============================================================================
  # Attestation Job (runs after all images are pushed)
  # =============================================================================

  attest:
    name: Attest Images
    runs-on: ubuntu-latest
    needs: [build, docker-manifest]
    if: needs.build.outputs.release_outcome == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Attest eidos image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/eidos
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest eidosd image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/eidosd
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest eidos-validator image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/eidos-validator
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

  # =============================================================================
  # Publish: Flip draft release to public after attestation succeeds
  # =============================================================================

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [attest]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false

  # =============================================================================
  # Deploy Job (runs after release is published)
  # =============================================================================

  deploy:
    name: Deploy API Server
    runs-on: ubuntu-latest
    needs: [publish]
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    env:
      IDENTITY_PROVIDER: 'projects/116689922666/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
      SERVICE_ACCOUNT: 'github-actions'
      PROJECT_ID: 'eidosx'
      RUN_REGION: 'us-west1'
      RUN_SERVICE: 'api'
      # Source: GHCR image built by GoReleaser
      SOURCE_IMAGE: 'ghcr.io/nvidia/eidosd'
      # Target: Artifact Registry demo repository
      TARGET_REGISTRY: 'us-docker.pkg.dev/eidosx/demo'
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Deploy Demo API Server
        uses: ./.github/actions/cloud-run-deploy
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER }}
          service_account: "${{ env.SERVICE_ACCOUNT }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          region: ${{ env.RUN_REGION }}
          service: ${{ env.RUN_SERVICE }}
          source_image: "${{ env.SOURCE_IMAGE }}:${{ github.ref_name }}"
          target_registry: ${{ env.TARGET_REGISTRY }}
          image_name: 'eidosd'
          ghcr_token: ${{ github.token }}
          crane_version: ${{ steps.versions.outputs.crane }}
