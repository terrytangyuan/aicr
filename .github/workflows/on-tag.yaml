name: On Tag Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Only build tags with semantic versioning format

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VALIDATOR_IMAGE: ghcr.io/nvidia/aicr-validator

jobs:

  # =============================================================================
  # Test Jobs (reusable workflow — same suite as on-push.yaml)
  # =============================================================================

  tests:
    uses: ./.github/workflows/qualification.yaml
    permissions:
      actions: read
      contents: read

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Security Scan
        uses: ./.github/actions/security-scan
        with:
          severity: 'MEDIUM'
          category: 'trivy-fs'

  # =============================================================================
  # Build Job: GoReleaser (binaries, ko images, draft GitHub release)
  # =============================================================================

  build:
    name: Build and Release (Draft)
    runs-on: ubuntu-latest
    needs: [tests, security-scan]
    timeout-minutes: 30
    outputs:
      release_outcome: ${{ steps.release.outputs.release_outcome }}
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for changelog generation
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: true

      - name: Build and Release
        id: release
        uses: ./.github/actions/go-build-release
        with:
          ko_version: ${{ steps.versions.outputs.ko }}

      - name: Malware Scan Release Binaries
        if: steps.release.outcome == 'success'
        uses: ./.github/actions/malware-scan
        with:
          scan_path: dist/
          category: 'clamav-release-binaries'

  # =============================================================================
  # Docker Jobs: Native per-arch validator builds (parallel with GoReleaser)
  # =============================================================================

  docker-validator:
    name: Docker Validator (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [tests, security-scan]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: Dockerfile.validator
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.VALIDATOR_IMAGE }}:${{ github.ref_name }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=aicr-validator
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # =============================================================================
  # Docker Manifest: Combine per-arch images into multi-arch manifests
  # =============================================================================

  docker-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker-validator]
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Create multi-arch manifest
        uses: ./.github/actions/docker-manifest
        with:
          image: ${{ env.VALIDATOR_IMAGE }}
          tag: ${{ github.ref_name }}

  # =============================================================================
  # Container Image Vulnerability Scan (runs after all images are built)
  # =============================================================================

  image-vuln-scan:
    name: Image Vuln Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [build, docker-manifest]
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr.io/nvidia/aicr
          - ghcr.io/nvidia/aicrd
          - ghcr.io/nvidia/aicr-validator
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Scan container image
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # v0.33.1
        with:
          scan-type: 'image'
          image-ref: '${{ matrix.image }}:${{ github.ref_name }}'
          scanners: 'vuln'
          ignore-unfixed: true
          format: 'sarif'
          output: 'image-scan-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          limit-severities-for-sarif: true
        continue-on-error: true

      - name: Check SARIF file exists
        id: check_sarif
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "image-scan-results.sarif" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF to GitHub Security
        if: steps.check_sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@b20883b0cd1f46c72ae0ba6d1090936928f9fa30  # v4.32.0
        with:
          sarif_file: image-scan-results.sarif
          category: 'trivy-image-${{ matrix.image }}'
        continue-on-error: true

  # =============================================================================
  # Attestation Job (runs after all images are pushed and scanned)
  # =============================================================================

  attest:
    name: Attest Images
    runs-on: ubuntu-latest
    needs: [build, docker-manifest]
    if: needs.build.outputs.release_outcome == 'success'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Attest aicr image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/aicr
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest aicrd image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/aicrd
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest aicr-validator image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/aicr-validator
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

  # =============================================================================
  # Publish: Flip draft release to public after attestation succeeds
  # =============================================================================

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [attest, image-vuln-scan]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false

  # =============================================================================
  # Cleanup: Warn if attestation failed (images exist without attestation)
  # =============================================================================

  release-check:
    name: Release Integrity Check
    runs-on: ubuntu-latest
    needs: [build, attest, image-vuln-scan]
    if: always() && needs.build.outputs.release_outcome == 'success'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check attestation status
        run: |
          set -euo pipefail
          if [[ "${{ needs.attest.result }}" != "success" ]]; then
            echo "::error::Attestation failed or was skipped. Images exist on GHCR without attestation."
            echo "::error::Manual action required: verify attestation for ${{ github.ref_name }} or delete the draft release."
            echo ""
            echo "Recovery steps:"
            echo "  1. Re-run the 'Attest Images' job from the Actions tab"
            echo "  2. Or delete the draft release and re-tag"
            exit 1
          fi

          if [[ "${{ needs.image-vuln-scan.result }}" == "failure" ]]; then
            echo "::warning::Image vulnerability scan reported findings. Check the Security tab for details."
          fi

          echo "Release integrity check passed."

  # =============================================================================
  # Deploy Job (runs after release is published)
  # =============================================================================

  deploy:
    name: Deploy API Server
    runs-on: ubuntu-latest
    needs: [publish, release-check]
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      IDENTITY_PROVIDER: 'projects/116689922666/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
      SERVICE_ACCOUNT: 'github-actions'
      PROJECT_ID: 'eidosx'
      RUN_REGION: 'us-west1'
      RUN_SERVICE: 'api'
      # Source: GHCR image built by GoReleaser
      SOURCE_IMAGE: 'ghcr.io/nvidia/aicrd'
      # Target: Artifact Registry demo repository
      TARGET_REGISTRY: 'us-docker.pkg.dev/eidosx/demo'
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Deploy Demo API Server
        uses: ./.github/actions/cloud-run-deploy
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER }}
          service_account: "${{ env.SERVICE_ACCOUNT }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          region: ${{ env.RUN_REGION }}
          service: ${{ env.RUN_SERVICE }}
          source_image: "${{ env.SOURCE_IMAGE }}:${{ github.ref_name }}"
          target_registry: ${{ env.TARGET_REGISTRY }}
          image_name: 'aicrd'
          ghcr_token: ${{ github.token }}
          crane_version: ${{ steps.versions.outputs.crane }}
