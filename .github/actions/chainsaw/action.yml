name: 'Chainsaw Conformance Tests'
description: 'Build eidos binary and run AI-conformance offline tests with Chainsaw'

inputs:
  go_version:
    description: 'Go version to install (e.g., 1.25)'
    required: true
  chainsaw_version:
    description: 'Chainsaw version to install (e.g., v0.2.14)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: '${{ inputs.go_version }}'
        cache: true
        cache-dependency-path: |
          go.sum
          vendor/modules.txt
        check-latest: true

    - name: Install Chainsaw
      shell: bash
      run: go install github.com/kyverno/chainsaw@${{ inputs.chainsaw_version }}

    - name: Build eidos binary
      shell: bash
      env:
        GOFLAGS: -mod=vendor
      run: go build -o dist/e2e/eidos ./cmd/eidos

    - name: Run AI-conformance offline tests
      shell: bash
      run: |
        EIDOS_BIN=$(pwd)/dist/e2e/eidos chainsaw test \
          --no-cluster \
          --config tests/chainsaw/chainsaw-config.yaml \
          --test-dir tests/chainsaw/ai-conformance/offline/
