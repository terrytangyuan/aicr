name: Documentation Request
description: Report a documentation issue or request new documentation
title: "[Docs]: "
labels: ["documentation", "needs-triage"]

body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and found no duplicates
          required: true

  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - Correction or update to existing docs
        - New documentation needed
        - Documentation is unclear or incomplete
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (currently preventing usage)
        - High
        - Medium
        - Low (would be nice)
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Documentation link (if correcting existing docs)
      placeholder: "https://github.com/NVIDIA/aicr/blob/main/docs/..."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the documentation problem or what documentation is missing.
      placeholder: |
        For corrections: what is wrong and what should it say?
        For new docs: what topic needs to be documented and why?
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change (optional)
      description: If you have a specific suggestion for the documentation change, describe it here.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/NVIDIA/aicr/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow the Code of Conduct
          required: true
