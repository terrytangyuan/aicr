# Language Versions
languages:
  go: '1.26.0'

# Build Tools
build_tools:
  goreleaser: 'v2'
  ko: 'v0.18.0'
  crane: 'v0.21.0'
  git_cliff: '2.12.0'

# Linting
linting:
  golangci_lint: 'v2.10.1'
  yamllint: '1.38.0'
  addlicense: 'v1.1.1'
  go_licenses: 'v1.6.0'

# Security Tools
security_tools:
  grype: 'v0.107.0'

# E2E Testing Tools
testing_tools:
  kubectl: 'v1.35.0'
  kind: '0.31.0'
  ctlptl: '0.9.0'
  tilt: '0.36.3'
  helm: 'v4.1.1'
  kwok: 'v0.7.0'
  chainsaw: 'v0.2.14'
  yq: 'v4.52.4'
  karpenter: 'v1.8.0'

# Quality Thresholds
quality:
  coverage_threshold: '70'
  lint_timeout: '5m'
  test_timeout: '10m'

# Build Configuration
build:
  image_registry: 'ghcr.io/nvidia'

# Testing Configuration
testing:
  kind_node_image: 'kindest/node:v1.32.0'
