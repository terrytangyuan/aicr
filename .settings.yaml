# Language Versions
languages:
  go: '1.26.1'

# Build Tools
build_tools:
  goreleaser: 'v2'
  ko: 'v0.18.0'
  crane: 'v0.21.0'
  git_cliff: '2.12.0'

# Linting
linting:
  golangci_lint: 'v2.10.1'
  yamllint: '1.38.0'
  addlicense: 'v1.1.1'
  go_licenses: 'v1.6.0'

# Security Tools
security_tools:
  grype: 'v0.107.0'
  cosign: 'v3.0.4'
  syft: 'v1.42.2'

# E2E Testing Tools
testing_tools:
  kubectl: 'v1.35.0'
  kind: '0.31.0'
  ctlptl: '0.9.0'
  tilt: '0.37.0'
  helm: 'v4.1.1'
  kwok: 'v0.7.0'
  chainsaw: 'v0.2.14'
  chainsaw_checksums:
    linux_amd64: 'f2f4a3f9a541d65db12f5c910950758f7d56fae20ad5b1272cdc271c9568443e'
    linux_arm64: 'b6494b71e490ab825890fc12cc575de7f59bfa637d5cfe73c66987e4454e397c'
    darwin_amd64: '983ce0e4ff32a2112481833d7be4e0a0f0530fadba630fa93d3a635539bc1db0'
    darwin_arm64: 'ff806554a15e12faca08b54d373a61e27808f40c34208248924f7b71a301f786'
  yq: 'v4.52.4'
  karpenter: 'v1.8.0'

# Area Assignees (GitHub usernames assigned to issues by area label)
area_assignees:
  area/api: cullenmcdermott,mchmarny
  area/bundler: ArangoGutierrez,mchmarny
  area/ci: mchmarny,mchmarny
  area/cli: lockwobr,mchmarny
  area/collector: ayuskauskas,mchmarny
  area/docs: dims,mchmarny
  area/infra: mchmarny,dims
  area/recipes: yuanchen8911,mchmarny
  area/security: mchmarny,dims
  area/tests: atif1996,mchmarny
  area/validator: xdu31,mchmarny

# Quality Thresholds
quality:
  coverage_threshold: '70'
  lint_timeout: '10m'
  test_timeout: '10m'

# Build Configuration
build:
  image_registry: 'ghcr.io/nvidia'

# Documentation Tools
docs_tools:
  hugo: '0.155.3'
  node: '22'

# Testing Configuration
testing:
  kind_node_image: 'kindest/node:v1.32.0'

  # Component test harness configuration
  # Used by tools/component-test/ scripts to validate individual components
  component_test:
    nvml_mock_version: '0.1.0'
    nvml_mock_image: 'ghcr.io/nvidia/nvml-mock'
    default_gpu_profile: 'a100'
    default_gpu_count: 8
    cluster_name: 'aicr-component-test'
    helm_timeout: '300s'
    health_check_timeout: '5m'
