# Node Feature Discovery Health Check
#
# Validates the standalone NFD deployment by checking:
# 1. NFD Master Deployment has at least one ready replica
# 2. NFD Worker DaemonSet has at least one ready pod
# 3. No pods in unhealthy phases (Pending, Failed, Unknown)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: nfd-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-master-deployment
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: node-feature-discovery-master
                namespace: node-feature-discovery
              status:
                (availableReplicas > `0`): true
    - name: validate-worker-daemonset
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: node-feature-discovery-worker
                namespace: node-feature-discovery
              status:
                (numberReady > `0`): true
    - name: validate-all-pods-healthy
      try:
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: node-feature-discovery
              status:
                phase: Pending
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: node-feature-discovery
              status:
                phase: Failed
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: node-feature-discovery
              status:
                phase: Unknown
