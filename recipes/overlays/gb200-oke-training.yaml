kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: gb200-oke-training

spec:
  # Inherits from oke-training recipe (OKE + training settings)
  base: oke-training

  criteria:
    service: oke
    accelerator: gb200
    intent: training

  # Specific constraints for GB200 on OKE training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    # GB200-specific GPU Operator overrides (inherits valuesFile from oke-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
      overrides:
        gdrcopy:
          enabled: true

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
