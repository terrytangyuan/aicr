kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-eks-ubuntu-inference-dynamo

spec:
  # Inherits from h100-eks-ubuntu-inference (H100 + Ubuntu inference settings)
  # Adds Dynamo inference platform components.
  base: h100-eks-ubuntu-inference

  criteria:
    service: eks
    accelerator: h100
    os: ubuntu
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  # EKS Dynamo networking prerequisite:
  # allow GPU node SG -> system node SG on TCP 2379 (etcd) and 4222 (NATS).
  # See docs/integrator/eks-dynamo-networking.md.

  componentRefs:
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true

    - name: dynamo-crds
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.9.0"
      valuesFile: components/dynamo-crds/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.9.0"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - dynamo-crds
        - cert-manager
        - kube-prometheus-stack
        - gpu-operator
        - kai-scheduler
      overrides:
        etcd:
          persistence:
            storageClass: gp2
        nats:
          config:
            jetstream:
              fileStore:
                pvc:
                  storageClassName: gp2

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access