kind: RecipeMetadata
apiVersion: eidos.nvidia.com/v1alpha1
metadata:
  name: h100-eks-ubuntu-inference-dynamo

spec:
  # Inherits from h100-eks-ubuntu-inference (H100 + Ubuntu inference settings)
  # Adds Dynamo inference platform components.
  base: h100-eks-ubuntu-inference

  criteria:
    service: eks
    accelerator: h100
    os: ubuntu
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  # AWS Security Group Prerequisites (EKS only):
  #
  # Dynamo-platform's etcd (port 2379) and NATS (port 4222) typically run on
  # system nodes. If GPU worker nodes are in a different subnet/security group,
  # AWS SGs may block this traffic, causing pods to fail with:
  #   - "Unable to create lease" (etcd unreachable)
  #   - "JetStream not available" (NATS unreachable)
  #
  # To fix, allow ingress from the GPU node SG to the system node SG:
  #
  #   # 1. Find security group IDs for system and GPU nodes:
  #   aws ec2 describe-instances \
  #     --filters "Name=tag:eks:nodegroup-name,Values=<system-nodegroup>" \
  #     --query "Reservations[0].Instances[0].SecurityGroups[*].GroupId" --output text
  #   aws ec2 describe-instances \
  #     --filters "Name=tag:eks:nodegroup-name,Values=<gpu-nodegroup>" \
  #     --query "Reservations[0].Instances[0].SecurityGroups[*].GroupId" --output text
  #
  #   # 2. Allow etcd and NATS traffic from GPU nodes to system nodes:
  #   aws ec2 authorize-security-group-ingress --group-id <system-sg-id> \
  #     --protocol tcp --port 2379 --source-group <gpu-sg-id>
  #   aws ec2 authorize-security-group-ingress --group-id <system-sg-id> \
  #     --protocol tcp --port 4222 --source-group <gpu-sg-id>

  componentRefs:
    # Pin GPU Operator to v25.3.4 for dynamo inference recipes.
    # GPU Operator v25.10.0+ with cdi.enabled=true triggers KAI scheduler
    # to inject runtimeClassName: nvidia, which activates the
    # management.nvidia.com CDI path and fails with "unresolvable CDI
    # devices". v25.3.4 with cdi.default=false avoids this while still
    # enabling CDI for DRA GPU allocation.
    - name: gpu-operator
      type: Helm
      version: v25.3.4
      overrides:
        cdi:
          enabled: true
          default: false

    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true
        # EKS has no control-plane nodes — remove the default nodeAffinity
        controller:
          affinity:
            nodeAffinity: null
          tolerations:
            - operator: Exists

    - name: dynamo-crds
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.8.1"
      valuesFile: components/dynamo-crds/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.8.1"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - dynamo-crds
        - cert-manager
        - kube-prometheus-stack
      overrides:
        etcd:
          persistence:
            storageClass: gp2
        nats:
          config:
            jetstream:
              fileStore:
                pvc:
                  storageClassName: gp2
