kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: gb200-oke-ubuntu-inference-dynamo

spec:
  # Inherits from gb200-oke-ubuntu-inference (GB200 + Ubuntu inference settings)
  # Adds Dynamo inference platform components.
  base: gb200-oke-ubuntu-inference

  criteria:
    service: oke
    accelerator: gb200
    os: ubuntu
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true

    - name: dynamo-crds
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.9.0"
      valuesFile: components/dynamo-crds/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.9.0"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - dynamo-crds
        - cert-manager
        - kube-prometheus-stack
        - gpu-operator
        - kai-scheduler
      overrides:
        etcd:
          persistence:
            storageClass: oci-bv
        nats:
          config:
            jetstream:
              fileStore:
                pvc:
                  storageClassName: oci-bv

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - robust-controller
        - secure-accelerator-access
        - pod-autoscaling
        - cluster-autoscaling
