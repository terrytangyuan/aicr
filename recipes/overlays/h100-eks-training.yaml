kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-eks-training

spec:
  # Inherits from eks-training recipe (EKS + training settings)
  base: eks-training

  criteria:
    service: eks
    accelerator: h100
    intent: training

  # Specific constraints for H100 on EKS training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    # H100-specific GPU Operator overrides (inherits valuesFile from eks-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - skyhook-customizations
      overrides:
        cdi:
          enabled: true
        gdrcopy:
          enabled: true

    - name: skyhook-customizations
      type: Helm
      manifestFiles:
        - components/skyhook-customizations/manifests/tuning.yaml
      overrides:
        service: eks
        accelerator: h100
        intent: multiNodeTraining
      dependencyRefs:
        - skyhook-operator

  # Validation checks for H100 on EKS training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    performance:
      checks:
        - nccl-all-reduce-bw
      constraints:
        - name: nccl-all-reduce-bw
          value: ">= 300"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
