kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: rtx-pro-6000-lke-training

spec:
  # Inherits from lke-training recipe (LKE + training settings)
  base: lke-training

  criteria:
    service: lke
    accelerator: rtx-pro-6000
    intent: training

  # Specific constraints for RTX PRO 6000 on LKE training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.31"

  componentRefs:
    # RTX PRO 6000 GPU Operator dependencies
    # Single-GPU card — no NVLink, no NCCL multi-node tuning needed
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - cert-manager
        - kube-prometheus-stack

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
