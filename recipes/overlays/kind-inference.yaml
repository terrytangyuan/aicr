kind: recipeMetadata
apiVersion: eidos.nvidia.com/v1alpha1
metadata:
  name: kind-inference

spec:
  # Inherits from kind recipe (kind-specific settings)
  base: kind

  criteria:
    service: kind
    intent: inference

  # Inference specific constraints for kind workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.30"

  componentRefs:
    - name: kgateway-crds
      type: Helm
      source: oci://cr.kgateway.dev/kgateway-dev/charts
      version: v2.0.0
      valuesFile: components/kgateway-crds/values.yaml
      manifestFiles:
        - components/kgateway-crds/manifests/gateway-api-crds.yaml
        - components/kgateway-crds/manifests/inference-extension-crds.yaml

    - name: kgateway
      type: Helm
      source: oci://cr.kgateway.dev/kgateway-dev/charts
      version: v2.0.0
      valuesFile: components/kgateway/values.yaml
      manifestFiles:
        - components/kgateway/manifests/inference-gateway.yaml
      dependencyRefs:
        - kgateway-crds
        - cert-manager
