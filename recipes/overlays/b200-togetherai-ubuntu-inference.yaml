kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: b200-togetherai-ubuntu-inference

spec:
  base: b200-togetherai-inference

  criteria:
    service: togetherai
    accelerator: b200
    os: ubuntu
    intent: inference

  constraints:
    - name: OS.release.ID
      value: ubuntu

  componentRefs: []

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - secure-accelerator-access
        - pod-autoscaling
