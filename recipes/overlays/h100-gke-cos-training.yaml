kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-gke-cos-training

spec:
  # Inherits from gke-cos-training recipe (GKE COS + training settings)
  base: gke-cos-training

  criteria:
    service: gke
    accelerator: h100
    os: cos
    intent: training

  # Specific constraints for H100 on GKE COS training workloads
  constraints:
    - name: K8s.server.version
      value: ">= 1.32"

  componentRefs:
    # H100-specific GPU Operator overrides (inherits valuesFile from gke-cos-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - cert-manager
        - kube-prometheus-stack
        - skyhook-customizations
      overrides:
        cdi:
          enabled: true

    # NCCL TCPXO installer for GPUDirect high-speed inter-node communication.
    # Requires GKE cluster with multi-NIC networking configured for GPU node pool.
    - name: gke-nccl-tcpxo
      manifestFiles:
        - components/gke-nccl-tcpxo/manifests/nccl-tcpxo-installer.yaml
      dependencyRefs:
        - gpu-operator

    # GKE COS uses skyhook no-op: COS has an immutable rootfs, so kernel
    # tuning packages (nvidia-setup, nvidia-tuned) that require apt cannot
    # be installed. Replace with a COS-specific tuning manifest if one
    # becomes available.
    - name: skyhook-customizations
      type: Helm
      manifestFiles:
        - components/skyhook-customizations/manifests/no-op.yaml
      overrides:
        service: gke
        accelerator: h100
        intent: multiNodeTraining
      dependencyRefs:
        - skyhook-operator

  validation:
    performance:
      checks:
        - nccl-all-reduce-bw
      constraints:
        - name: nccl-all-reduce-bw
          value: ">= 100"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
