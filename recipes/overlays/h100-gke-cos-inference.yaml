kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-gke-cos-inference

spec:
  # Inherits from gke-cos-inference recipe (GKE COS + inference settings)
  base: gke-cos-inference

  criteria:
    service: gke
    accelerator: h100
    os: cos
    intent: inference

  # Specific constraints for H100 on GKE COS inference workloads
  constraints:
    - name: K8s.server.version
      value: ">= 1.32"

  componentRefs:
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - skyhook-customizations
      overrides:
        cdi:
          enabled: true

    - name: skyhook-customizations
      type: Helm
      manifestFiles:
        - components/skyhook-customizations/manifests/tuning-gke.yaml
      overrides:
        accelerator: h100
        intent: inference
      dependencyRefs:
        - skyhook-operator
