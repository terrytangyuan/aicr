kind: recipeMetadata
apiVersion: eidos.nvidia.com/v1alpha1
metadata:
  name: h100-eks-inference

spec:
  # Inherits from eks-inference recipe (EKS + inference settings)
  base: eks-inference

  criteria:
    service: eks
    accelerator: h100
    intent: inference

  # Specific constraints for H100 on EKS inference workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    - name: skyhook-customizations
      type: Helm
      manifestFiles:
        - components/skyhook-customizations/manifests/tuning.yaml
      overrides:
        service: aws
        accelerator: h100
        intent: inference
      dependencyRefs:
        - skyhook-operator