kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: b200-togetherai-training

spec:
  base: togetherai-training

  criteria:
    service: togetherai
    accelerator: b200
    intent: training

  componentRefs:
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - cert-manager
        - kube-prometheus-stack
        - skyhook-customizations
      overrides:
        cdi:
          enabled: true
        gdrcopy:
          enabled: true

    - name: skyhook-customizations
      type: Helm
      manifestFiles:
        - components/skyhook-customizations/manifests/tuning.yaml
      overrides:
        service: togetherai
        accelerator: b200
        intent: multiNodeTraining
      dependencyRefs:
        - skyhook-operator
