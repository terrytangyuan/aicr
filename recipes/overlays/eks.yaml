kind: recipeMetadata
apiVersion: eidos.nvidia.com/v1alpha1
metadata:
  name: eks

spec:
  # Inherits from base (implicit when spec.base is empty)
  # This recipe contains EKS-specific settings shared by all EKS deployments

  criteria:
    service: eks

  # EKS-specific constraints
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.28"

  # EKS-specific components
  componentRefs:
    # Disabled by default: EKS clusters typically have EBS CSI driver
    # installed as a managed addon. Deploying it again causes ClusterRole
    # conflicts ("managed-by: EKS" vs "managed-by: Helm").
    # Users can re-enable with: --set aws-ebs-csi-driver.enabled=true
    - name: aws-ebs-csi-driver
      type: Helm
      source: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
      version: 2.55.0
      valuesFile: components/aws-ebs-csi-driver/values.yaml
      overrides:
        enabled: false

    # Enable Prometheus persistent storage for EKS (requires EBS CSI driver)
    - name: kube-prometheus-stack
      type: Helm
      overrides:
        prometheus:
          prometheusSpec:
            storageSpec:
              emptyDir: null
              volumeClaimTemplate:
                spec:
                  storageClassName: gp2
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
    - name: aws-efa
      type: Helm
      version: v0.5.3
      valuesFile: components/aws-efa/values.yaml
