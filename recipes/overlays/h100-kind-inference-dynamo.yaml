kind: recipeMetadata
apiVersion: eidos.nvidia.com/v1alpha1
metadata:
  name: h100-kind-inference-dynamo

spec:
  # Inherits from h100-kind-inference (H100 + kind + inference settings)
  # Adds Dynamo inference platform components.
  base: h100-kind-inference

  criteria:
    service: kind
    accelerator: h100
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: kai-scheduler
      type: Helm
      source: oci://ghcr.io/nvidia/kai-scheduler
      version: v0.12.10
      valuesFile: components/kai-scheduler/values.yaml
      dependencyRefs:
        - gpu-operator

    - name: dynamo-crds
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.8.1"
      valuesFile: components/dynamo-crds/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "0.8.1"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - dynamo-crds
        - cert-manager
        - kube-prometheus-stack
      overrides:
        # Use kind's local-path-provisioner instead of EBS gp2
        etcd:
          persistence:
            storageClass: standard
        nats:
          config:
            jetstream:
              fileStore:
                pvc:
                  storageClassName: standard
