kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: togetherai

spec:
  # Inherits from base (implicit when spec.base is empty)
  # TogetherAI-specific settings shared by all TogetherAI deployments

  criteria:
    service: togetherai

  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    # TogetherAI pre-installs NVIDIA drivers; disable driver installation
    - name: gpu-operator
      type: Helm
      valuesFile: components/gpu-operator/values-togetherai.yaml

    # NVIDIA Network Operator with SR-IOV Device Plugin for InfiniBand RDMA.
    # TogetherAI B200 nodes have Mellanox mlx5Gen VF NICs (0x101e) over InfiniBand.
    # Required to expose NICs as nvidia.com/mlnxnics Kubernetes resources.
    - name: network-operator
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia
      version: "25.10.0"
      valuesFile: components/network-operator/values-togetherai.yaml
      dependencyRefs:
        - cert-manager

    # TogetherAI has user-accessible control-plane nodes — keep default nodeAffinity
    - name: nvidia-dra-driver-gpu
      type: Helm

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
