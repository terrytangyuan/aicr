# Kubeflow Training Operator (kubeflow-trainer) Helm values
# Enables distributed training with TrainJob API
# Ref: https://www.kubeflow.org/docs/components/trainer/

# Override release name prefix
fullnameOverride: kubeflow-trainer

# manager configuration
manager:
  # Resource requests and limits for the controller
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Leader election for HA deployments
  leaderElection:
    enabled: true

  # Logging configuration
  logging:
    # Verbosity level (0=info, 1=debug, 2=trace)
    verbosity: 0

  # Service account configuration
  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # Prometheus metrics
  metrics:
    enabled: true
    # ServiceMonitor for Prometheus Operator
    serviceMonitor:
      enabled: true

  # Security context for pods
  podSecurityContext:
    runAsNonRoot: true

  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

# Install CRDs (TrainJob, etc.)
crds:
  install: true

# JobSet integration (required for TrainJob)
# JobSet provides the underlying primitive for multi-replica training jobs
jobset:
  # Enable JobSet controller installation
  # Set to false if JobSet is already installed in the cluster
  enabled: true

# Webhook configuration for TrainJob validation
webhook:
  enabled: true
  # Port for the webhook server
  port: 9443
