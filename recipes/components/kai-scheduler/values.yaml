# KAI Scheduler Helm values
# GPU-aware Kubernetes scheduler for AI workloads with gang scheduling,
# hierarchical queuing, bin-packing, and topology-aware placement.
# Satisfies CNCF AI Conformance gang scheduling requirement.

global:
  tolerations:
    - operator: Exists

# Disable post-delete hook job — it does not inherit global.tolerations
# and will hang Pending on clusters with tainted nodes.
# Helm uninstall already removes the deployments this hook would delete.
postCleanup:
  enabled: false

# CDI support for GPU device assignment
admission:
  cdi: true
