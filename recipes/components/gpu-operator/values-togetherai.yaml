# GPU Operator Helm values
# TogetherAI cluster configuration overrides
#
# Key differences from EKS:
# - driver.enabled: false — TogetherAI pre-installs NVIDIA drivers on GPU nodes
# - gdrcopy.enabled: false — not supported with host-managed driver

cdi:
  enabled: true
  default: true

driver:
  enabled: false

gdrcopy:
  enabled: false

toolkit:
  enabled: true
  env:
    - name: ACCEPT_NVIDIA_VISIBLE_DEVICES_ENVVAR_WHEN_UNPRIVILEGED
      value: "false"
    - name: ACCEPT_NVIDIA_VISIBLE_DEVICES_AS_VOLUME_MOUNTS
      value: "true"

devicePlugin:
  env:
    - name: DP_DISABLE_HEALTHCHECKS
      value: "x"
    - name: DEVICE_LIST_STRATEGY
      value: cdi-cri,cdi-annotations,volume-mounts
