# GPU Operator Helm values
# Base configuration for all deployments

# Override release name prefix to avoid eidos-stack- prefix in resource names
fullnameOverride: gpu-operator

operator:
  upgradeCRD: true
  resources:
    limits:
      cpu: 500m
      memory: 700Mi
    requests:
      cpu: 200m
      memory: 300Mi

dcgm:
  enabled: true

toolkit:
  enabled: true
  env:
  - name: ACCEPT_NVIDIA_VISIBLE_DEVICES_ENVVAR_WHEN_UNPRIVILEGED
    value: "false"
  - name: ACCEPT_NVIDIA_VISIBLE_DEVICES_AS_VOLUME_MOUNTS
    value: "true"

dcgmExporter:
  serviceMonitor:
    enabled: false
    interval: 60s
  config:
    name: "dcgm-exporter"
    create: true

gdrcopy:
  enabled: true
  version: v2.5

gfd:
  enabled: true

driver:
  version: 580.105.08
  enabled: true
  useOpenKernelModules: true
  maxParallelUpgrades: 5
  rdma:
    enabled: true

devicePlugin:
  env:
    - name: DP_DISABLE_HEALTHCHECKS
      value: "109"
    - name: DEVICE_LIST_STRATEGY
      value: cdi-cri,cdi-annotations,volume-mounts

migManager:
  enabled: true

validator:
  plugin:
    # Note: env must have at least one entry due to gpu-operator chart template bug.
    # When env is empty/null, the chart renders spec.validator.plugin as null instead
    # of an empty object, causing validation error: "must be of type object: null"
    env:
      - name: WITH_WORKLOAD
        value: "false"

# Node Feature Discovery sub-chart
node-feature-discovery:
  fullnameOverride: node-feature-discovery
