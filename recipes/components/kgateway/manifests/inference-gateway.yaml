# Inference Gateway — provides external access to inference services
# via the Kubernetes Gateway API. Any inference workload (dynamo, vLLM,
# TGI, etc.) can route through this gateway using HTTPRoute or
# InferenceModel resources.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: kgateway-system
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
