# Network Operator Helm values — TogetherAI
#
# TogetherAI B200 nodes use Mellanox ConnectX Family mlx5Gen Virtual Function
# NICs (device 0x101e) over InfiniBand for RDMA-backed GPU-to-GPU communication.
# No OFED driver installation required (pre-managed by TogetherAI).
#
# Source: AOR nicclusterpolicy.yaml.tmpl, togetherai provider block.

sriovDevicePlugin:
  image: sriov-network-device-plugin
  repository: ghcr.io/k8snetworkplumbingwg
  version: v3.9.0
  config: |
    {
      "resourceList": [
        {
          "resourcePrefix": "nvidia.com",
          "resourceName": "mlnxnics",
          "selectors": {
            "vendors": ["15b3"],
            "devices": ["101e"],
            "linkTypes": ["infiniband"],
            "isRdma": true
          }
        }
      ]
    }
