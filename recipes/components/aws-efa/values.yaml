# AWS EFA Device Plugin Helm values
# Base configuration for EFA-enabled EKS clusters

image:
  repository: 602401143452.dkr.ecr.us-west-2.amazonaws.com/eks/aws-efa-k8s-device-plugin
  tag: v0.5.3

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: false

supportedInstanceLabels:
  keys:
    - nodeGroup
    - node.dgxc.nvidia.com/has-gpu
  values:
    - gpu
    - "true"

resources:
  requests:
    cpu: 10m
    memory: 20Mi

# Node selector and tolerations applied via nodeScheduling
# These are managed by CLI flags:
#   --accelerated-node-selector
#   --accelerated-node-toleration
nodeSelector: {}

tolerations:
  - key: dedicated
    value: "user-workload"

affinity:
  nodeAffinity: {}

additionalPodAnnotations: {}

additionalPodLabels: {}

# Override release name prefix to avoid eidos-stack- prefix in resource names
fullnameOverride: aws-efa-k8s-device-plugin

imagePullSecrets: []
